pipeline:
  name: ci-tidbits-parallel-steps
  identifier: citidbitsparallelsteps
  projectIdentifier: nidapractice
  orgIdentifier: Harness_Training
  tags: {}
  properties:
    ci:
      codebase:
        repoName: ci-tidbits-parallel-steps
        build: <+input>
        sparseCheckout: []
  stages:
    - stage:
        name: Build
        identifier: Build
        description: ""
        type: CI
        spec:
          cloneCodebase: true
          caching:
            enabled: false
            override: false
            paths: []
          buildIntelligence:
            enabled: false
          platform:
            os: Linux
            arch: Amd64
          runtime:
            type: Cloud
            spec: {}
          execution:
            steps:
              - step:
                  type: Run
                  name: Compile
                  identifier: Compile
                  spec:
                    connectorRef: account.harnessImage
                    image: maven:3.9-eclipse-temurin-17
                    shell: Sh
                    command: mvn compile
              - step:
                  type: Semgrep
                  name: Static Code Analysis
                  identifier: Static_Code_Analysis
                  spec:
                    mode: orchestration
                    config: default
                    target:
                      type: repository
                      detection: auto
                    advanced:
                      log:
                        level: info
              - step:
                  type: RunTests
                  name: Unit Testing
                  identifier: Unit_Testing
                  spec:
                    connectorRef: account.harnessImage
                    language: Java
                    buildTool: Maven
                    args: test
                    runOnlySelectedTests: true
                    reports:
                      type: JUnit
                      spec:
                        paths:
                          - target/surefire-reports/*.xml
                    enableTestSplitting: false
                    image: maven:3.9-eclipse-temurin-17
              - parallel:
                  - step:
                      type: RunTests
                      name: Tests Product
                      identifier: test_product
                      spec:
                        connectorRef: account.harnessImage
                        language: Java
                        buildTool: Maven
                        args: test -P product-tests -B
                        runOnlySelectedTests: true
                        reports:
                          type: JUnit
                          spec:
                            paths:
                              - target/surefire-reports/product/*.xml
                        enableTestSplitting: false
                        image: maven:3.9-eclipse-temurin-17
                  - step:
                      type: RunTests
                      name: Tests Cart
                      identifier: test_cart
                      spec:
                        connectorRef: account.harnessImage
                        language: Java
                        buildTool: Maven
                        args: test -P cart-tests -B
                        runOnlySelectedTests: true
                        reports:
                          type: JUnit
                          spec:
                            paths:
                              - target/surefire-reports/cart/*.xml
                        enableTestSplitting: false
                        image: maven:3.9-eclipse-temurin-17
                  - step:
                      type: RunTests
                      name: Tests Order
                      identifier: test_order
                      spec:
                        connectorRef: account.harnessImage
                        language: Java
                        buildTool: Maven
                        args: test -P order-tests -B
                        runOnlySelectedTests: true
                        reports:
                          type: JUnit
                          spec:
                            paths:
                              - target/surefire-reports/order/*.xml
                        enableTestSplitting: false
                        image: maven:3.9-eclipse-temurin-17
                  - step:
                      type: RunTests
                      name: Tests User
                      identifier: test_user
                      spec:
                        connectorRef: account.harnessImage
                        language: Java
                        buildTool: Maven
                        args: test -P user-tests -B
                        runOnlySelectedTests: true
                        reports:
                          type: JUnit
                          spec:
                            paths:
                              - target/surefire-reports/user/*.xml
                        enableTestSplitting: false
                        image: maven:3.9-eclipse-temurin-17
              - step:
                  type: Run
                  name: Build
                  identifier: Build
                  spec:
                    connectorRef: account.harnessImage
                    image: maven:3.9-eclipse-temurin-17
                    shell: Sh
                    command: |-
                      mvn package
                      ls
              - step:
                  type: Run
                  name: Deploy War Artifacts
                  identifier: Deploy_War_Artifacts
                  spec:
                    connectorRef: account.harnessImage
                    image: maven:3.9-eclipse-temurin-17
                    shell: Sh
                    command: |-
                      cat << 'EOF' > settings.xml
                      <settings xmlns="http://maven.apache.org/SETTINGS/1.0.0"
                                xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
                                xsi:schemaLocation="http://maven.apache.org/SETTINGS/1.0.0 https://maven.apache.org/xsd/settings-1.0.0.xsd">
                        <servers>
                          <server>
                            <id>maven-dev</id>
                            <username>nida.ap@harness.io</username>
                            <password><+secrets.getValue("ARMavenTokenValue")></password>
                          </server>
                        </servers>
                      </settings>
                      EOF
                      mvn -s settings.xml deploy
